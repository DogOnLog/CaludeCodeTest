<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    
    :root {
      --bg:        #0d0d14;
      --surface:   #13131f;
      --border:    #1e1e30;
      --accent:    #39d98a;
      --accent-dim:#1a6644;
      --danger:    #ff5c5c;
      --text:      #e2e2f0;
      --muted:     #4a4a6a;
      --glow:      rgba(57,217,138,.25);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      gap: 20px;
      padding: 24px 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--glow);
    }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 24px;
      text-align: center;
      min-width: 110px;
    }
    .stat-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      transition: transform .1s;
    }
    .stat-value.pop { transform: scale(1.3); }

    /* ── Game area ── */
    .game-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 0 40px var(--glow);
    }
    canvas { display: block; }

    /* ── Overlay modal ── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,20,.88);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
    }
    #overlay-icon { font-size: 3rem; line-height: 1; }
    #overlay-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
    }
    #overlay-msg {
      font-size: .9rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    #btn {
      margin-top: 8px;
      padding: 12px 36px;
      background: var(--accent);
      color: #080810;
      border: none;
      border-radius: 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, transform .1s;
      box-shadow: 0 4px 24px var(--glow);
    }
    #btn:hover { background: #4fffa0; box-shadow: 0 4px 32px var(--glow); }
    #btn:active { transform: scale(.97); }

    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 28px;
    }
    .controls-sep {
      color: var(--border);
      font-size: .8rem;
    }

    /* ── Autopilot toggle ── */
    #auto-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px 6px 8px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s, color .2s, box-shadow .2s;
    }
    #auto-btn:hover { border-color: var(--accent); color: var(--text); }
    #auto-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }
    .toggle-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .2s;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
    #auto-btn.active .toggle-dot { background: var(--accent); }

    /* ── Touch d-pad (mobile) ── */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: var(--accent-dim); }

    @media (max-width: 520px) {
      .dpad { display: flex; }
      .controls-bar .hints { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">🐍</div>
    <h1>SNAKE</h1>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Punteggio</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Record</div>
      <div class="stat-value" id="high-score">0</div>
    </div>
  </div>

  <div class="game-wrapper">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="overlay-icon">🐍</div>
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Guida il serpente verso il cibo.<br>Evita i muri e te stesso.</p>
      <button id="btn">INIZIA</button>
    </div>
  </div>

  <div class="controls-bar">
    <div class="hints" style="display:flex;align-items:center;gap:6px;">
      <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
      <span class="controls-sep">·</span>
      <span class="kbd">↑</span><span class="kbd">←</span><span class="kbd">↓</span><span class="kbd">→</span>
      <span class="controls-sep">·</span>
      <span class="kbd">P</span> <span style="font-size:.75rem;color:var(--muted)">pausa</span>
    </div>
    <button id="auto-btn">
      <span class="toggle-dot">🤖</span>
      Autopilota
    </button>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" id="d-up">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" id="d-left">◀</div>
      <div class="dpad-btn" id="d-down">▼</div>
      <div class="dpad-btn" id="d-right">▶</div>
    </div>
  </div>

<script src="snake.js"></script>
</body>
</html>
