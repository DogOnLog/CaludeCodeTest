<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #4ecca3; letter-spacing: 4px; }
    #score-board {
      display: flex;
      gap: 40px;
      margin-bottom: 14px;
      font-size: 1rem;
    }
    #score-board span { color: #4ecca3; font-weight: bold; font-size: 1.2rem; }
    canvas {
      border: 2px solid #4ecca3;
      border-radius: 6px;
      box-shadow: 0 0 30px #4ecca355;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #overlay h2 { font-size: 2rem; color: #4ecca3; }
    #overlay p { color: #aaa; font-size: 1rem; }
    button {
      margin-top: 8px;
      padding: 10px 30px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    button:hover { background: #38b28e; }
    #controls {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score-board">
    <div>Punteggio: <span id="score">0</span></div>
    <div>Record: <span id="high-score">0</span></div>
  </div>
  <div style="position:relative;">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">Snake</h2>
      <p id="overlay-msg">Usa le frecce o WASD per muoverti</p>
      <button id="btn">Inizia</button>
    </div>
  </div>
  <div id="controls">
    Frecce / WASD per muoversi &nbsp;|&nbsp; P per pausa &nbsp;|&nbsp;
    <button id="auto-btn" style="padding:4px 14px;font-size:0.8rem;margin-top:0;">Autopilota: OFF</button>
  </div>

<script src="snake.js"></script>
</body>
</html>
